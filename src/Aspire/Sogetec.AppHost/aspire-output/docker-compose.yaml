      REVERSEPROXY__ROUTES__route2__TRANSFORMS__1__Set: "https"
      REVERSEPROXY__ROUTES__route2__TRANSFORMS__2__RequestHeader: "X-Forwarded-Host"
      REVERSEPROXY__ROUTES__route2__TRANSFORMS__2__Append: "{Host}"
      REVERSEPROXY__ROUTES__route2__TRANSFORMS__3__ResponseHeader: "X-Powered-By"
      REVERSEPROXY__ROUTES__route2__TRANSFORMS__3__Append: "Sogetec Gateway"
      REVERSEPROXY__ROUTES__route2__TRANSFORMS__3__When: "Success"
