      REVERSEPROXY__ROUTES__route3__TRANSFORMS__1__Set: "https"
      REVERSEPROXY__ROUTES__route3__TRANSFORMS__2__ResponseHeader: "X-Powered-By"
      REVERSEPROXY__ROUTES__route3__TRANSFORMS__2__Append: "Sogetec Gateway"
      REVERSEPROXY__ROUTES__route3__TRANSFORMS__2__When: "Success"
      REVERSEPROXY__CLUSTERS__cluster_sogetec-api__LOADBALANCINGPOLICY: "RoundRobin"
      REVERSEPROXY__CLUSTERS__cluster_sogetec-api__HEALTHCHECK__ACTIVE__ENABLED: "True"
